<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="NOVOPLAST — Premium Non-Tearable Plastic Prints. Custom Posters, Spiritual Prints & Weatherproof Stickers. Built to last forever." />
    <meta name="keywords" content="non-tearable prints, waterproof posters, spiritual prints, custom stickers, plastic prints, durable posters" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>NOVOPLAST — Non-Tearable Plastic Prints</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://novoplast.com/" />
    <meta property="og:title" content="NOVOPLAST — Premium Non-Tearable Plastic Prints" />
    <meta property="og:description" content="Custom Posters, Spiritual Prints & Weatherproof Stickers. Built to last forever." />
    <meta property="og:image" content="/social-banner.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://novoplast.com/" />
    <meta property="twitter:title" content="NOVOPLAST — Premium Non-Tearable Plastic Prints" />
    <meta property="twitter:description" content="Custom Posters, Spiritual Prints & Weatherproof Stickers. Built to last forever." />
    <meta property="twitter:image" content="/social-banner.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  </head>
  <body class="bg-dark-900 text-white font-body antialiased">
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100vw';
        errDiv.style.height = '100vh';
        errDiv.style.backgroundColor = 'red';
        errDiv.style.color = 'white';
        errDiv.style.zIndex = '999999';
        errDiv.style.padding = '20px';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.style.overflow = 'auto';
        errDiv.innerHTML = '<h1>Global Crash:</h1><p>' + message + '</p><p>' + source + ':' + lineno + ':' + colno + '</p><pre>' + (error && error.stack ? error.stack : '') + '</pre>';
        document.body.appendChild(errDiv);
      };
      window.addEventListener("unhandledrejection", function(e) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100vw';
        errDiv.style.height = '100vh';
        errDiv.style.backgroundColor = 'orange';
        errDiv.style.color = 'black';
        errDiv.style.zIndex = '999999';
        errDiv.style.padding = '20px';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.style.overflow = 'auto';
        errDiv.innerHTML = '<h1>Unhandled Promise:</h1><pre>' + (e.reason ? (e.reason.stack || e.reason) : e) + '</pre>';
        document.body.appendChild(errDiv);
      });
    </script>
    <div id="root"></div>
    <script>
      setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || root.innerHTML.trim() === '') {
          var diag = document.createElement('div');
          diag.style.position = 'fixed';
          diag.style.top = '0';
          diag.style.left = '0';
          diag.style.width = '100vw';
          diag.style.height = '100vh';
          diag.style.backgroundColor = 'blue';
          diag.style.color = 'white';
          diag.style.zIndex = '999999';
          diag.style.padding = '20px';
          diag.style.fontFamily = 'monospace';
          diag.style.overflow = 'auto';
          
          var perfEntries = performance.getEntriesByType('resource');
          var jsFailed = perfEntries.filter(e => e.name.endsWith('.js') && (e.responseStatus >= 400 || e.responseStatus === 0));
          
          diag.innerHTML = '<h1>REACT FAILED TO MOUNT</h1>' +
            '<p>Root is completely empty after 3 seconds.</p>' +
            '<p>User Agent: ' + navigator.userAgent + '</p>' +
            '<h2>Failed Network Resources:</h2><pre>' + JSON.stringify(jsFailed, null, 2) + '</pre>' +
            '<h2>All JS Scripts:</h2><pre>' + JSON.stringify(perfEntries.filter(e => e.name.endsWith('.js')).map(e => e.name + ' - Status: ' + e.responseStatus), null, 2) + '</pre>';
          document.body.appendChild(diag);
        }
      }, 3000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
